services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: sahiy-agent-db
    environment:
      POSTGRES_USER: sahiy
      POSTGRES_PASSWORD: sahiy_test
      POSTGRES_DB: sahiy_agent
    # Local default 5433; production VPS: use docker-compose.override.yml → 127.0.0.1:5435
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - sahiy_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sahiy -d sahiy_agent"]
      interval: 5s
      timeout: 5s
      retries: 5

  go-api:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    ports:
      - "8001:8001"
    env_file: .env
    # Inside the compose network reach Postgres by service name, not localhost.
    environment:
      DATABASE_URL: "postgres://sahiy:sahiy_test@postgres:5432/sahiy_agent"
    command: ["sahiy-api"]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

  go-bot:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: "postgres://sahiy:sahiy_test@postgres:5432/sahiy_agent"
    command: ["sahiy-bot"]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  sahiy_pgdata:
