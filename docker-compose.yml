services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: sahiy-agent-db
    environment:
      POSTGRES_USER: sahiy
      POSTGRES_PASSWORD: sahiy_test
      POSTGRES_DB: sahiy_agent
    # No host port published: the Go services reach Postgres over the compose
    # network (postgres:5432). This avoids clashing with other projects' DBs on
    # this host (e.g. attendance_db already owns 5433). For host-side psql use:
    #   docker compose exec postgres psql -U sahiy -d sahiy_agent
    # To expose locally, add e.g.  ports: ["127.0.0.1:5436:5432"]  in an override.
    expose:
      - "5432"
    volumes:
      - sahiy_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sahiy -d sahiy_agent"]
      interval: 5s
      timeout: 5s
      retries: 5

  go-api:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    ports:
      - "8001:8001"
    env_file: .env
    # Inside the compose network reach Postgres by service name, not localhost.
    environment:
      DATABASE_URL: "postgres://sahiy:sahiy_test@postgres:5432/sahiy_agent"
    command: ["sahiy-api"]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

  go-bot:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: "postgres://sahiy:sahiy_test@postgres:5432/sahiy_agent"
    command: ["sahiy-bot"]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  sahiy_pgdata:
